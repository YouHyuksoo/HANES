// ── State ──
let currentDomain = 0;
let scale = 1;
let panX = 0, panY = 0;
let dragging = null, dragOff = {x:0,y:0};
let panning = false, panStart = {x:0,y:0};
let entityPositions = {};

// ── Sidebar ──
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<h3>도메인</h3>';
  domains.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'domain-btn' + (i===currentDomain?' active':'');
    btn.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${d.color};margin-right:8px"></span>${d.name}<span class="count">${d.tables.length}</span>`;
    btn.onclick = () => { currentDomain=i; renderSidebar(); renderERD(); };
    sb.appendChild(btn);
  });
}

// ── Layout ──
function layoutEntities(tables) {
  const cols = Math.ceil(Math.sqrt(tables.length));
  const colW = 260, rowH = 200, padX = 60, padY = 40;
  const positions = {};
  tables.forEach((t,i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    positions[t.n] = { x: padX + col * colW, y: padY + row * rowH };
  });
  return positions;
}

// ── Render ──
function renderERD() {
  const dom = domains[currentDomain];
  const g = document.getElementById('erdGroup');
  g.innerHTML = '';

  entityPositions = layoutEntities(dom.tables);
  const W = 220, headerH = 36, rowH = 18, pad = 6;

  // Relations first (behind entities)
  dom.rels.forEach(rel => {
    const fromPos = entityPositions[rel.from];
    const toPos = entityPositions[rel.to];
    if (!fromPos || !toPos) return;

    const fromTable = dom.tables.find(t=>t.n===rel.from);
    const toTable = dom.tables.find(t=>t.n===rel.to);
    if (!fromTable || !toTable) return;

    const fH = headerH + (fromTable.pk.length + fromTable.cols.length) * rowH + pad*2;
    const tH = headerH + (toTable.pk.length + toTable.cols.length) * rowH + pad*2;

    let x1 = fromPos.x + W/2, y1 = fromPos.y + fH/2;
    let x2 = toPos.x + W/2, y2 = toPos.y + tH/2;

    // Determine connection points
    if (Math.abs(x1-x2) > Math.abs(y1-y2)) {
      if (x1 > x2) { x1 = fromPos.x; x2 = toPos.x + W; }
      else { x1 = fromPos.x + W; x2 = toPos.x; }
      y1 = fromPos.y + fH/2;
      y2 = toPos.y + tH/2;
    } else {
      if (y1 > y2) { y1 = fromPos.y; y2 = toPos.y + tH; }
      else { y1 = fromPos.y + fH; y2 = toPos.y; }
      x1 = fromPos.x + W/2;
      x2 = toPos.x + W/2;
    }

    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','path');
    const d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    line.setAttribute('d', d);
    line.setAttribute('class','rel-line');
    g.appendChild(line);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', mx);
    label.setAttribute('y', my - 6);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('class','rel-label');
    label.textContent = rel.label;
    g.appendChild(label);
  });

  // Entities
  dom.tables.forEach(table => {
    const pos = entityPositions[table.n];
    const allCols = [...table.pk.map(p=>({name:p,isPk:true})), ...table.cols.map(c=>({name:c,isPk:false}))];
    const h = headerH + allCols.length * rowH + pad*2;

    const entity = document.createElementNS('http://www.w3.org/2000/svg','g');
    entity.setAttribute('class','entity');
    entity.setAttribute('data-table', table.n);
    entity.setAttribute('transform', `translate(${pos.x},${pos.y})`);

    // Body
    const body = document.createElementNS('http://www.w3.org/2000/svg','rect');
    body.setAttribute('width', W);
    body.setAttribute('height', h);
    body.setAttribute('fill','#1e293b');
    body.setAttribute('stroke', dom.color);
    entity.appendChild(body);

    // Header
    const hdr = document.createElementNS('http://www.w3.org/2000/svg','rect');
    hdr.setAttribute('width', W);
    hdr.setAttribute('height', headerH);
    hdr.setAttribute('fill', dom.color);
    hdr.setAttribute('class','header-rect');
    entity.appendChild(hdr);

    // Title
    const title = document.createElementNS('http://www.w3.org/2000/svg','text');
    title.setAttribute('x', W/2);
    title.setAttribute('y', 15);
    title.setAttribute('text-anchor','middle');
    title.setAttribute('class','title');
    title.textContent = table.k;
    entity.appendChild(title);

    const subtitle = document.createElementNS('http://www.w3.org/2000/svg','text');
    subtitle.setAttribute('x', W/2);
    subtitle.setAttribute('y', 29);
    subtitle.setAttribute('text-anchor','middle');
    subtitle.setAttribute('class','subtitle');
    subtitle.textContent = table.n;
    entity.appendChild(subtitle);

    // Columns
    allCols.forEach((col,ci) => {
      const y = headerH + pad + ci * rowH + 12;

      if (col.isPk) {
        const badge = document.createElementNS('http://www.w3.org/2000/svg','text');
        badge.setAttribute('x', 8);
        badge.setAttribute('y', y);
        badge.setAttribute('class','pk-badge');
        badge.textContent = 'PK';
        entity.appendChild(badge);
      }

      const name = document.createElementNS('http://www.w3.org/2000/svg','text');
      name.setAttribute('x', col.isPk ? 28 : 12);
      name.setAttribute('y', y);
      name.setAttribute('class','col-name');
      name.textContent = col.name;
      entity.appendChild(name);
    });

    // Drag events
    entity.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.stopPropagation();
      dragging = table.n;
      const p = pos;
      dragOff = { x: e.clientX/scale - p.x + panX, y: e.clientY/scale - p.y + panY };
    });

    g.appendChild(entity);
  });

  updateTransform();
}

function updateTransform() {
  const g = document.getElementById('erdGroup');
  g.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
}

// ── Interaction ──
const area = document.getElementById('canvasArea');
area.addEventListener('mousemove', (e) => {
  if (dragging) {
    entityPositions[dragging] = {
      x: e.clientX/scale - dragOff.x + panX*(1/scale-1),
      y: e.clientY/scale - dragOff.y + panY*(1/scale-1)
    };
    renderERD();
  } else if (panning) {
    panX += e.clientX - panStart.x;
    panY += e.clientY - panStart.y;
    panStart = {x: e.clientX, y: e.clientY};
    updateTransform();
  }
});
area.addEventListener('mouseup', () => { dragging = null; panning = false; });
area.addEventListener('mousedown', (e) => {
  if (!dragging) { panning = true; panStart = {x: e.clientX, y: e.clientY}; }
});
area.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  updateTransform();
});

function zoomIn() { scale = Math.min(3, scale * 1.2); updateTransform(); }
function zoomOut() { scale = Math.max(0.3, scale * 0.8); updateTransform(); }
function resetView() { scale = 1; panX = 0; panY = 0; updateTransform(); }

// ── Init ──
renderSidebar();
renderERD();
</script>
